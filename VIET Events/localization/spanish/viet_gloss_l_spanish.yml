 COURTESY_BOOK_GLOSS: "#bold Courtesy books#!, or #bold Books of Manners#!, were a genre of texts popular in medieval and early modern Europe that instructed its readers in proper etiquette and social norms, particularly in the context of court life."
 # Version 1.18.2 Start Here - Note to Translators: please leave this comment here and do not remove it even in your versions of the loc
 FALCATORS_GLOSS: "The term #bold Falcator#! derives from the Latin word #italic falcatus#!, meaning sickle-shaped. The falcator, or scyther, was a person whose job was to cut fresh grass or plants that could be eaten by horses, usually with a scythe. Their role was crucial when traveling or on military campaigns, as their work ensured that horses would remain well-fed and healthy."
 OX_HEAD_AND_HORSE_FACE_GLOSS: "#bold Ox-Head and Horse-Face#! (known as #italic Niútóu#! and #italic Mǎmiàn#! in Chinese, #italic Gozu#! and #italic Mezu#! in Japanese, #italic Udu#! and #italic Mamyeon#! in Korean, and #italic Ngưu Đầu#! and #italic Mã Diện#! in Vietnamese) are two guardians of the underworld in East Asian mythology. They are said to have the bodies of men, but the head of an ox and horse respectively; they are believed to be the first beings a person encounters after dying, as they will typically escort the deceased to the underworld to be judged before the courts of Hell."
 # Version 1.18.3 Start Here - Note to Translators: please leave this comment here and do not remove it even in your versions of the loc
 BUDDHIST_CUISINE_GLOSS: "Contrary to some common stereotypes, the majority of Buddhist laity are not vegetarian, as vegetarianism is only mandatory for monks and nuns in some Buddhist sects, particularly Mahayana sects. Despite this, vegetarian meals were and are still traditionally consumed by Buddhists in East Asia (i.e. China, Japan, Korea, and Vietnam) especially on special occasions, such as during visits to the temples or on holidays; in historical times, East Asians rulers might host large vegetarian feasts to show their piety and compassion and to patronize Buddhist institutions. Because of this, a kind of cuisine called #bold Buddhist cuisine#! developed in East Asia over the centuries for these situations, which made creative use of various ingredients as meat substitutes, including tofu and wheat gluten. An interesting feature of this cuisine is the lack of onion and garlic, and other strong-smelling plants and herbs, as these are believed to increase distracting emotions like anger and lust. Nowadays, Buddhist temples in East Asia still frequently serve this cuisine."
