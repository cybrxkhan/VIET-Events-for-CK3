 LIAOZHAI_ZHIYI_GLOSS: "#bold Liáozhāi Zhìyì#!, a veces traducido al español como #bold Relatos Extraños desde un Estudio Chino#!, es una colección de cientos de relatos cortos del escritor de la dinastía Qīng, Pú Sōnglíng (1640-1715). Se consideran la máxima expresión de los llamados “relatos de lo extraño”, un género literario muy popular en Asia oriental que trataba temas sobrenaturales, similar al género gótico en la literatura occidental. Las historias sobrenaturales de Pú Sōnglíng incluyen relatos épicos de venganza e historia, terroríficos cuentos de fantasmas, sátiras cómicas sobre la sociedad y el gobierno, romances conmovedores e incluso relatos más simples, casi breves, a modo de crónicas sobre fenómenos inusuales y mucho más. Sus relatos ejercieron una gran influencia en la literatura china, japonesa, coreana y vietnamita posterior, y siguen siendo populares en Asia hasta hoy en día."
FOX_SPIRIT_GLOSS: "El #bold espíritu zorro#! es un tipo de espíritu embaucador propio de la mitología y la ficción de Asia oriental. Son conocidos como #italic húlijīng#! en China, #italic yoho#! en Corea, #italic yōko#! en Japón y #italic ho ly tinh#! en Vietnam. Estos cambiaformas suelen aparecer como mujeres hermosas, aunque pueden adoptar muchas otras formas, como la de un anciano o un fornido soldado. Se creía que causaban travesuras que iban desde bromas inofensivas hasta, supuestamente, la muerte o la caída de dinastías enteras. Su representación, negativa o más ambigua, variaba según el país, la época o la historia; sin embargo, en algunos relatos se los mostraba de manera más compasiva, como ayudantes benévolos (aunque traviesos) o como esposas y parejas románticas afectuosas y leales."
 # Version 1.18.1 Start Here - Note to Translators: please leave this comment here and do not remove it even in your versions of the loc
 COURTESY_BOOK_GLOSS: "#bold Libros de cortesía#! o #bold libros de modales#! fueron un género de textos populares en la Europa medieval y moderna temprana que instruían a sus lectores sobre la etiqueta adecuada y las normas sociales, particularmente en el contexto de la vida cortesana."
 # Version 1.18.2 Start Here - Note to Translators: please leave this comment here and do not remove it even in your versions of the loc
FALCATORS_GLOSS: "El término #bold falcador#! deriva de la palabra latina #italic falcatus#!, que significa 'en forma de hoz'. El falcador, o segador, era una persona cuyo trabajo consistía en cortar hierba fresca o plantas que pudieran ser consumidas por los caballos, generalmente con una guadaña. Su papel era crucial durante los viajes o las campañas militares, ya que su trabajo aseguraba que los caballos se mantuvieran bien alimentados y saludables."
OX_HEAD_AND_HORSE_FACE_GLOSS: "#bold Cabeza de Buey y Cara de Caballo#! (conocidos como #italic Niútóu#! y #italic Mǎmiàn#! en chino, #italic Gozu#! y #italic Mezu#! en japonés, #italic Udu#! y #italic Mamyeon#! en coreano, y #italic Ngưu Đầu#! y #italic Mã Diện#! en vietnamita) son dos guardianes del inframundo en la mitología de Asia Oriental. Se dice que tienen cuerpos de hombre, pero cabeza de buey y de caballo respectivamente; se cree que son los primeros seres que una persona encuentra después de morir, ya que suelen escoltar al difunto al inframundo para ser juzgado ante los tribunales del Infierno."
 # Version 1.18.3 Start Here - Note to Translators: please leave this comment here and do not remove it even in your versions of the loc
BUDDHIST_CUISINE_GLOSS: "Contrariamente a algunos estereotipos comunes, la mayoría de los laicos budistas no son vegetarianos, ya que el vegetarianismo solo es obligatorio para monjes y monjas en algunas sectas budistas, particularmente en las sectas Mahayana. A pesar de esto, las comidas vegetarianas eran y siguen siendo tradicionalmente consumidas por los budistas en Asia Oriental (es decir, China, Japón, Corea y Vietnam), especialmente en ocasiones especiales, como durante las visitas a los templos o en días festivos; en tiempos históricos, los gobernantes de Asia Oriental solían organizar grandes banquetes vegetarianos para mostrar su piedad y compasión y para patrocinar instituciones budistas. Debido a esto, a lo largo de los siglos se desarrolló en Asia Oriental un tipo de cocina llamada #bold cocina budista#! para estas ocasiones, que hacía un uso creativo de diversos ingredientes como sucedáneos de la carne, incluyendo el tofu y el gluten de trigo. Una característica interesante de esta cocina es la ausencia de cebolla, ajo y otras plantas y hierbas de olor fuerte, ya que se cree que estas aumentan emociones perturbadoras como la ira y la lujuria. Hoy en día, los templos budistas de Asia Oriental siguen sirviendo frecuentemente esta cocina."
